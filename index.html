<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>camaron culichi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    /* Video de fondo */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.50);
      z-index: -1;
    }

    .container {
      text-align: center;
      padding: 20px;
      z-index: 1;
      margin-top: 300px;
    }

    h1 {
      font-size: 3.8rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 15px rgba(255,140,0,0.7), 3px 3px 10px #000;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 2.0rem;
      margin-top: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(145deg, #ff6b00, #ff4500, #ff8c00);
      border-radius: 60px;
      box-shadow: 
        /* sombra exterior neón */
        0 0 30px #ff4500,
        0 0 60px #ff8c00,
        /* sombra interna para efecto 3D hundido */
        inset 0 6px 12px rgba(0,0,0,0.6),
        inset 0 -4px 8px rgba(255,255,255,0.15);
      border: 3px solid #ffb347;
      text-shadow: 
        0 2px 4px rgba(0,0,0,0.7),
        0 0 10px rgba(255,255,255,0.6);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-8px) scale(1.06);
      box-shadow: 
        0 0 50px #ff4500,
        0 0 100px #ff8c00,
        inset 0 8px 16px rgba(0,0,0,0.5),
        inset 0 -6px 12px rgba(255,255,255,0.2);
      border-color: #ffea80;
    }

    .btn:active {
      transform: translateY(-3px) scale(0.98);
      box-shadow: 
        0 0 20px #ff4500,
        inset 0 4px 8px rgba(0,0,0,0.7);
    }

    /* Efecto brillo extra (opcional pero queda muy fosfo) */
    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0.6;
      pointer-events: none;
      transition: all 0.4s;
    }

    .btn:hover::before {
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.8rem; }
      .btn {
        font-size: 1.5rem;
        padding: 1.3rem 3.2rem;
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="video1.mp4" type="video/mp4">
    Tu navegador no soporta videos.
  </video>

  <div class="overlay"></div>

  <div class="container">
    <h1>¡Bienvenido!</h1>

    <div class="buttons">
      <a href="imagenmenu1.png" target="_blank" class="btn">MENÚ</a>

      <a href="https://maps.app.goo.gl/SBPpbC7itaPebRxJ7" target="_blank" class="btn">CUÉNTANOS TU EXPERIENCIA</a>
    </div>
  </div>

</body>
</html>
