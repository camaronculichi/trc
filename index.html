<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camarón Culichi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    /* Video de fondo */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.50);
      z-index: -1;
    }

    /* Header con íconos sociales */
    .header {
      position: fixed;
      top: 30px;
      left: 0;
      right: 0;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .social-icon {
      width: 50px;
      height: 50px;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
    }

    .social-icon:hover {
      transform: scale(1.15) rotate(5deg);
      filter: drop-shadow(0 0 20px #ffffff) brightness(1.3);
    }

    .container {
      text-align: center;
      padding: 20px;
      z-index: 1;
      margin-top: 300px;
    }

    h1 {
      font-size: 3.8rem;
      margin-bottom: 2.5rem;
      text-shadow: 0 0 15px rgba(255,255,255,0.5), 3px 3px 10px #000;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-block;
      font-weight: bold;
      text-decoration: none;
      color: #fff;
      background: rgba(255, 255, 255, 0.08); /* blanco transparente suave */
      border: 3px solid #ffffff;
      border-radius: 60px;
      text-shadow: 0 1px 4px #000, 0 0 8px rgba(255,255,255,0.7);
      box-shadow: 
        0 0 25px rgba(255, 255, 255, 0.6),
        0 0 50px rgba(255, 255, 255, 0.3),
        inset 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    /* Botón MENÚ - más grande */
    .btn-menu {
      font-size: 1.6rem;
      padding: 1.4rem 4.5rem;
      border-radius: 70px;
    }

    /* Botón CUÉNTANOS - más pequeño */
    .btn-small {
      font-size: 1.1rem;
      padding: 1rem 3rem;
      border-radius: 50px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.20);
      transform: translateY(-8px) scale(1.05);
      box-shadow: 
        0 0 60px #ffffff,
        0 0 120px rgba(255,255,255,0.6),
        inset 0 6px 14px rgba(0,0,0,0.4);
      border-color: #ffffff;
    }

    .btn:active {
      transform: translateY(-2px) scale(0.97);
      box-shadow: 
        0 0 30px #ffffff,
        inset 0 4px 10px rgba(0,0,0,0.7);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .btn:hover::before {
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.8rem; }
      .btn-menu {
        font-size: 1.4rem;
        padding: 1.2rem 4rem;
      }
      .btn-small {
        font-size: 1rem;
        padding: 0.9rem 2.8rem;
      }
      .social-icon {
        width: 60px;
        height: 60px;
      }
      .header {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="video1.mp4" type="video/mp4">
    Tu navegador no soporta videos.
  </video>

  <div class="overlay"></div>

  <!-- Íconos sociales -->
  <div class="header">
    <a href="https://www.facebook.com/share/1CFk2kdY1V/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">
      <img src="face.png" alt="Facebook" class="social-icon">
    </a>
    
    <a href="https://wa.me/528714632883" target="_blank" rel="noopener noreferrer">
      <img src="whats.png" alt="WhatsApp" class="social-icon">
    </a>
  </div>

  <div class="container">
    <h1></h1>

    <div class="buttons">
      <!-- CAMBIO AQUÍ: abre menu.html en lugar de imagen -->
      <a href="menu.html" class="btn btn-menu">MENÚ</a>

      <a href="https://maps.app.goo.gl/SBPpbC7itaPebRxJ7" target="_blank" class="btn btn-small">RECOMIENDANOS</a>
    </div>
  </div>

</body>
</html>
