<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Datos para Facturar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
       
        :root { --primary: #1e3a8a; --accent: #3b82f6; }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            min-height: 100vh;
            padding: 15px;
        }
       
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }
       
        .back-arrow {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 32px;
            color: white;
            cursor: pointer;
            z-index: 10;
            text-decoration: none;
        }
       
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }
       
        h1 { font-size: 1.8rem; }
        .subtitle { opacity: 0.9; font-size: 1rem; margin-top: 5px; }
       
        .form-section { padding: 25px; }
       
        .section-title {
            font-size: 1.3rem;
            color: var(--primary);
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
        }
       
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #374151; }
       
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
       
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
       
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
       
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
       
        #sendBtn {
            background: #10b981;
            font-weight: 700;
            font-size: 1.2rem;
        }
       
        .success {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            display: none;
        }
       
        #preview img { max-width: 100%; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-arrow">←</a>
        
        <header>
            <h1>📤 Enviar Datos para Facturar</h1>
            <p class="subtitle">Se enviará a Culichifacturas1@gmail.com</p>
        </header>
       
        <div class="form-section">
            <h2 class="section-title">📋 Datos del Cliente</h2>
           
            <label for="nombre">Nombre o Razón Social *</label>
            <input type="text" id="nombre" placeholder="Ej. Elon reeve musk" required>
           
            <div class="row">
                <div>
                    <label for="rfc">RFC *</label>
                    <input type="text" id="rfc" placeholder="Ej. TOMB920101AAA" maxlength="13" required>
                </div>
                <div>
                    <label for="email">Tu Correo Electrónico *</label>
                    <input type="email" id="email" placeholder="easytaptrc@gmail.com" required>
                </div>
            </div>
            
            <label for="uso_cfdi">Uso de CFDI</label>
            <input type="text" id="uso_cfdi" placeholder="Ej. G03 - Gastos en general" value="G03 - Gastos en general">

            <h2 class="section-title">🛒 Datos de la Compra</h2>
           
            <div class="row">
                <div>
                    <label for="restaurante">Restaurante</label>
                    <input type="text" id="restaurante" placeholder="Ej. camarón culichi">
                </div>
                <div>
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha">
                </div>
            </div>
           
            <label for="total">Total de la cuenta *</label>
            <input type="number" id="total" step="0.01" placeholder="1234.56" required>
           
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" rows="3" placeholder="Algun comentario"></textarea>

            <h2 class="section-title">📸 Foto del Ticket Obligatorio</h2>
            
            <div style="margin:15px 0;">
                <button onclick="uploadPhoto()">📁 Agregar Foto (Galería o Cámara)</button>
            </div>
           
            <div id="preview"></div>
            
            <button id="sendBtn" onclick="enviarDatos()">
                🚀 Enviar Datos al Correo
            </button>
           
            <div class="success" id="success">
                ✅ Datos enviados correctamente a Culichifacturas1@gmail.com
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init({ publicKey: "RLyEAR8R7oizf8zfb" });

        let photoData = null;

        function setTodayDate() {
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        }

        function compressImage(base64, callback) {
            const img = new Image();
            img.src = base64;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600;
                const MAX_HEIGHT = 600;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                
                // Calidad muy baja
                photoData = canvas.toDataURL('image/jpeg', 0.25);
                callback();
            };
        }

        function uploadPhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        compressImage(ev.target.result, showPreview);
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function showPreview() {
            const preview = document.getElementById('preview');
            preview.innerHTML = `
                <p><strong>Foto seleccionada:</strong></p>
                <img src="${photoData}" alt="Ticket">
                <button onclick="clearPhoto()" style="background:#ef4444; margin-top:8px;">Eliminar Foto</button>
            `;
        }

        function clearPhoto() {
            document.getElementById('preview').innerHTML = '';
            photoData = null;
        }

        async function enviarDatos() {
            const btn = document.getElementById('sendBtn');
            const success = document.getElementById('success');
            const nombre = document.getElementById('nombre').value.trim();
            const rfc = document.getElementById('rfc').value.trim().toUpperCase();
            const email = document.getElementById('email').value.trim();
            const total = document.getElementById('total').value;

            if (!nombre || !rfc || !email || !total) {
                alert("❌ Completa los campos obligatorios (*)");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Enviando...";

            const templateParams = {
                from_name: nombre,
                rfc: rfc,
                cliente_email: email,
                uso_cfdi: document.getElementById('uso_cfdi').value || "G03",
                restaurante: document.getElementById('restaurante').value || "No especificado",
                fecha: document.getElementById('fecha').value,
                total: total,
                descripcion: document.getElementById('descripcion').value || "Sin descripción",
                fecha_envio: new Date().toLocaleString('es-MX'),
                photo: photoData || ""
            };

            try {
                const response = await emailjs.send("service_rzqr157", "template_zrfgzam", templateParams);
                console.log("✅ Éxito!", response);
                success.style.display = 'block';
                alert("✅ Datos enviados correctamente");
            } catch (error) {
                console.error("❌ Error:", error);
                alert("Error al enviar: " + (error.text || error));
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 Enviar Datos al Correo";
            }
        }

        window.onload = () => {
            setTodayDate();
        };
    </script>
</body>
</html>
